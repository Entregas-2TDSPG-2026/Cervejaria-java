spring.application.name=beer-guide

# H2 em memoria
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.datasource.url=jdbc:h2:mem:beerguide
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Actuator - expor health, info, metrics, caches
management.endpoints.web.exposure.include=health,info,metrics,caches
management.endpoint.health.show-details=always

# Info da aplicacao (visivel em /actuator/info)
info.app.name=Beer Guide
info.app.description=Guia de Cervejas Artesanais - Java Advanced FIAP
info.app.version=1.0.0
info.app.java-version=17
